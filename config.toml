# RustViking Configuration

[storage]
path = "./data/rustviking"
create_if_missing = true
max_open_files = 10000
use_fsync = false

[vector]
dimension = 768
index_type = "ivf_pq"

[vector.ivf_pq]
num_partitions = 256
num_sub_vectors = 16
pq_bits = 8
metric = "l2"

[logging]
level = "info"
format = "json"
output = "stdout"

[agfs]
default_scope = "resources"
default_account = "default"

# 向量存储插件配置
[vector_store]
plugin = "memory"  # memory, rocksdb, qdrant

# Memory 配置（当 plugin = "memory" 时使用，无需额外配置）
# [vector_store.memory]

# RocksDB 配置（当 plugin = "rocksdb" 时使用）
[vector_store.rocksdb]
path = "./data/rustviking/vector_store"

# Qdrant 配置（当 plugin = "qdrant" 时使用）
# [vector_store.qdrant]
# url = "http://localhost:6334"
# collection = "rustviking"
# timeout_ms = 5000
# api_key = ""  # Optional: Qdrant Cloud API key

# Embedding 插件配置
[embedding]
plugin = "mock"  # mock, openai, ollama

# Mock 配置（当 plugin = "mock" 时使用）
[embedding.mock]
dimension = 1024

# OpenAI 配置（当 plugin = "openai" 时使用）
# [embedding.openai]
# api_base = "https://api.openai.com/v1"
# api_key = "sk-..."
# model = "text-embedding-3-small"
# dimension = 1536
# max_concurrent = 10

# Ollama 配置（当 plugin = "ollama" 时使用）
# [embedding.ollama]
# url = "http://localhost:11434"
# model = "nomic-embed-text"
# dimension = 768
# max_concurrent = 5

# Summary configuration
[summary]
provider = "heuristic"  # Options: "noop", "heuristic"

# ============================================
# 云存储挂载 (未来扩展，当前未实现)
# ============================================
# AGFS 支持通过插件机制挂载多种存储后端。
# 以下配置示例展示了未来可扩展的云存储插件。
# 新增插件只需实现 StoragePlugin trait 并在 PluginRegistry 注册即可。
#
# S3 兼容存储 (S3FS 插件)
# [[mount.points]]
# path = "/s3"
# plugin = "s3fs"
# config = { bucket = "my-bucket", region = "us-east-1", endpoint = "https://s3.amazonaws.com", access_key = "${S3_ACCESS_KEY}", secret_key = "${S3_SECRET_KEY}" }
#
# SQL 数据库存储 (SQLFS 插件)
# [[mount.points]]
# path = "/sql"
# plugin = "sqlfs"
# config = { database_url = "sqlite:///path/to/db.sqlite", table_prefix = "agfs_" }
#
# 消息队列存储 (QueueFS 插件)
# [[mount.points]]
# path = "/queue"
# plugin = "queuefs"
# config = { broker_url = "redis://localhost:6379", queue_prefix = "agfs:" }
